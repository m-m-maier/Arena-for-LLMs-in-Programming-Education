version: '3.8'

services:

  postgres:
    image: postgres:17.2
    container_name: llmape_postgres
    environment:
      POSTGRES_DB: llmape
      POSTGRES_USER: llmape
      POSTGRES_PASSWORD: ${DB_PASSWORD_LLMAPE}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: ./llmape
    container_name: llmape_app
    environment:
      SPRING_PROFILES_ACTIVE: prod
      BASE_URL: ${BASE_URL}
      JHIPSTER_SECURITY_AUTHENTICATION_JWT_BASE64_SECRET: ${JHIPSTER_SECURITY_AUTHENTICATION_JWT_BASE64_SECRET}
      EMAIL_FROM: ${EMAIL_FROM}
      GMAIL_CLIENT_ID: ${GMAIL_CLIENT_ID}
      GMAIL_CLIENT_SECRET: ${GMAIL_CLIENT_SECRET}
      GMAIL_REFRESH_TOKEN: ${GMAIL_REFRESH_TOKEN}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/llmape
      SPRING_DATASOURCE_USERNAME: llmape
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD_LLMAPE}
      DB_PASSWORD_LLMAPE: ${DB_PASSWORD_LLMAPE}
      OPENAI_API_TOKEN: ${OPENAI_API_TOKEN}
      RATE_LIMIT_GLOBAL_PER_HOUR: ${RATE_LIMIT_GLOBAL_PER_HOUR}
      RATE_LIMIT_PER_IP_PER_HOUR: ${RATE_LIMIT_PER_IP_PER_HOUR}
    depends_on:
      - postgres
    ports:
      - "8080:8080"

  leaderboard:
    build: ./llmape/src/main/leaderboard
    container_name: llmape_leaderboard
    environment:
      DB_HOST: postgres
      DB_NAME: llmape
      DB_USER: llmape
      DB_PASSWORD_LLMAPE: ${DB_PASSWORD_LLMAPE}
    depends_on:
      - postgres

volumes:
  postgres_data: